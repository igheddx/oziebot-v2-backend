project: oziebot
aws_account_id: "608713827509"
cluster_name: oziebot-prod
alb:
  service_name: oziebot-api
  listener_port: 443
  target_group:
    name: oziebot-api-tg
    port: 8000
    protocol: HTTP
    health_check_path: /v1/ready
    success_codes: "200"
ecr_repositories:
  api: oziebot/api
  db-migrate: oziebot/api
  strategy-engine: oziebot/strategy-engine
  risk-engine: oziebot/risk-engine
  execution-engine: oziebot/execution-engine
  alerts-worker: oziebot/alerts-worker
  market-data-ingestor: oziebot/market-data-ingestor
ecs_services:
  api:
    service_name: oziebot-api
    container_name: api
    task_definition: infrastructure/aws/backend/task-definitions/api.json
  db-migrate:
    service_name: one-off
    container_name: db-migrate
    task_definition: infrastructure/aws/backend/task-definitions/db-migrate.json
  strategy-engine:
    service_name: oziebot-strategy-engine
    container_name: strategy-engine
    task_definition: infrastructure/aws/backend/task-definitions/strategy-engine.json
  risk-engine:
    service_name: oziebot-risk-engine
    container_name: risk-engine
    task_definition: infrastructure/aws/backend/task-definitions/risk-engine.json
  execution-engine:
    service_name: oziebot-execution-engine
    container_name: execution-engine
    task_definition: infrastructure/aws/backend/task-definitions/execution-engine.json
  alerts-worker:
    service_name: oziebot-alerts-worker
    container_name: alerts-worker
    task_definition: infrastructure/aws/backend/task-definitions/alerts-worker.json
  market-data-ingestor:
    service_name: oziebot-market-data-ingestor
    container_name: market-data-ingestor
    task_definition: infrastructure/aws/backend/task-definitions/market-data-ingestor.json
