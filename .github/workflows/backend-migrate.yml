name: Backend Migrate

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: ECR image tag to use for the migration task
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: "608713827509"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'oziebot-prod' }}
  ECR_REGISTRY: 608713827509.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
  ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
  ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
  DATABASE_URL_SECRET_ARN: ${{ vars.DATABASE_URL_SECRET_ARN }}
  ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
  ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
  ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP || 'DISABLED' }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render migration task definition
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/oziebot/api:${{ inputs.image_tag }}
        run: envsubst < infrastructure/aws/backend/task-definitions/db-migrate.json > task-definition.json

      - name: Register migration task definition
        id: register
        run: |
          TASK_DEF_ARN="$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migration task
        run: |
          TASK_ARN="$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --network-configuration "awsvpcConfiguration={subnets=[${ECS_SUBNETS}],securityGroups=[${ECS_SECURITY_GROUPS}],assignPublicIp=${ECS_ASSIGN_PUBLIC_IP}}" \
            --query 'tasks[0].taskArn' \
            --output text)"

          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"

          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"

          test "${EXIT_CODE}" = "0"
