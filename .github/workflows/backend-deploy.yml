name: Backend Deploy
# Repo-local deploy workflow for the split backend repository.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_ACCOUNT_ID: "608713827509"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'oziebot-prod' }}
  ECR_REGISTRY: 608713827509.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
  ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN || 'arn:aws:iam::608713827509:role/oziebot-ecs-execution-role' }}
  ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN || 'arn:aws:iam::608713827509:role/oziebot-ecs-task-role' }}
  DATABASE_URL_SECRET_ARN: ${{ vars.DATABASE_URL_SECRET_ARN }}
  JWT_SECRET_SECRET_ARN: ${{ vars.JWT_SECRET_SECRET_ARN }}
  STRIPE_SECRET_KEY_SECRET_ARN: ${{ vars.STRIPE_SECRET_KEY_SECRET_ARN }}
  STRIPE_WEBHOOK_SECRET_SECRET_ARN: ${{ vars.STRIPE_WEBHOOK_SECRET_SECRET_ARN }}
  EXCHANGE_CREDENTIALS_ENCRYPTION_KEY_SECRET_ARN: ${{ vars.EXCHANGE_CREDENTIALS_ENCRYPTION_KEY_SECRET_ARN }}
  SMS_WEBHOOK_URL_SECRET_ARN: ${{ vars.SMS_WEBHOOK_URL_SECRET_ARN }}
  SLACK_WEBHOOK_URL_SECRET_ARN: ${{ vars.SLACK_WEBHOOK_URL_SECRET_ARN }}
  TELEGRAM_BOT_TOKEN_SECRET_ARN: arn:aws:secretsmanager:us-east-1:608713827509:secret:oziebot/prod/alerts/telegram-bot-token-Pvxh0J
  ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
  ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
  ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP || 'DISABLED' }}
  REDIS_URL: ${{ vars.REDIS_URL }}
  OBSERVABILITY_S3_BUCKET: ${{ vars.OBSERVABILITY_S3_BUCKET }}
  OBSERVABILITY_S3_PREFIX: ${{ vars.OBSERVABILITY_S3_PREFIX || 'observability' }}
  OBSERVABILITY_S3_REGION: ${{ vars.OBSERVABILITY_S3_REGION || vars.AWS_REGION || 'us-east-1' }}

jobs:
  build-api-image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${ECR_REGISTRY}/oziebot/api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/services/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ env.ECR_REGISTRY }}/oziebot/api:latest

  migrate-api:
    needs: build-api-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize deploy inputs
        run: |
          for name in \
            ECS_EXECUTION_ROLE_ARN \
            ECS_TASK_ROLE_ARN \
            DATABASE_URL_SECRET_ARN \
            JWT_SECRET_SECRET_ARN \
            STRIPE_SECRET_KEY_SECRET_ARN \
            STRIPE_WEBHOOK_SECRET_SECRET_ARN \
            EXCHANGE_CREDENTIALS_ENCRYPTION_KEY_SECRET_ARN \
            SMS_WEBHOOK_URL_SECRET_ARN \
            SLACK_WEBHOOK_URL_SECRET_ARN \
            TELEGRAM_BOT_TOKEN_SECRET_ARN \
            ECS_SUBNETS \
            ECS_SECURITY_GROUPS \
            ECS_ASSIGN_PUBLIC_IP \
            REDIS_URL \
            OBSERVABILITY_S3_BUCKET \
            OBSERVABILITY_S3_PREFIX \
            OBSERVABILITY_S3_REGION
          do
            value="${!name:-}"
            cleaned="$(printf '%s' "$value" | tr -d '[:space:]')"
            echo "${name}=${cleaned}" >> "$GITHUB_ENV"
          done

      - name: Render migration task definition
        env:
          IMAGE_URI: ${{ needs.build-api-image.outputs.image_uri }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          template = Path("infrastructure/aws/backend/task-definitions/db-migrate.json").read_text()

          def replace_env(match):
              return json.dumps(os.environ.get(match.group(1), ""))[1:-1]

          rendered = re.sub(r"\$\{([A-Z0-9_]+)\}", replace_env, template)
          json.loads(rendered)
          Path("task-definition.json").write_text(rendered)
          PY

      - name: Register migration task definition
        id: register
        run: |
          TASK_DEF_ARN="$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migration task
        shell: bash
        run: |
          set -euo pipefail

          RUN_OUTPUT="$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --network-configuration "awsvpcConfiguration={subnets=[${ECS_SUBNETS}],securityGroups=[${ECS_SECURITY_GROUPS}],assignPublicIp=${ECS_ASSIGN_PUBLIC_IP}}" \
            --query '{taskArn: tasks[0].taskArn, failures: failures}' \
            --output json)"

          echo "${RUN_OUTPUT}"

          TASK_ARN="$(RUN_OUTPUT="${RUN_OUTPUT}" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["RUN_OUTPUT"])
          failures = payload.get("failures") or []
          if failures:
              raise SystemExit(
                  f"ECS run-task returned failures: {json.dumps(failures, sort_keys=True)}"
              )
          task_arn = payload.get("taskArn")
          if not task_arn:
              raise SystemExit("ECS run-task did not return a taskArn")
          print(task_arn)
          PY
          )"

          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"

          TASK_DETAILS="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0]' \
            --output json)"

          echo "${TASK_DETAILS}"

          EXIT_CODE="$(TASK_DETAILS="${TASK_DETAILS}" python3 - <<'PY'
          import json
          import os

          task = json.loads(os.environ["TASK_DETAILS"])
          containers = task.get("containers") or []
          exit_code = containers[0].get("exitCode") if containers else None
          print("" if exit_code is None else exit_code)
          PY
          )"

          if [ "${EXIT_CODE}" != "0" ]; then
            TASK_ID="${TASK_ARN##*/}"
            aws logs tail "/ecs/oziebot-prod/db-migrate" \
              --log-stream-names "ecs/db-migrate/${TASK_ID}" \
              --since 1h \
              --format short || true
            echo "Migration task exited with code ${EXIT_CODE}" >&2
            exit 1
          fi

  deploy-api:
    needs:
      - build-api-image
      - migrate-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize deploy inputs
        run: |
          for name in \
            ECS_EXECUTION_ROLE_ARN \
            ECS_TASK_ROLE_ARN \
            DATABASE_URL_SECRET_ARN \
            JWT_SECRET_SECRET_ARN \
            STRIPE_SECRET_KEY_SECRET_ARN \
            STRIPE_WEBHOOK_SECRET_SECRET_ARN \
            EXCHANGE_CREDENTIALS_ENCRYPTION_KEY_SECRET_ARN \
            SMS_WEBHOOK_URL_SECRET_ARN \
            SLACK_WEBHOOK_URL_SECRET_ARN \
            TELEGRAM_BOT_TOKEN_SECRET_ARN \
            ECS_SUBNETS \
            ECS_SECURITY_GROUPS \
            ECS_ASSIGN_PUBLIC_IP \
            REDIS_URL \
            OBSERVABILITY_S3_BUCKET \
            OBSERVABILITY_S3_PREFIX \
            OBSERVABILITY_S3_REGION
          do
            value="${!name:-}"
            cleaned="$(printf '%s' "$value" | tr -d '[:space:]')"
            echo "${name}=${cleaned}" >> "$GITHUB_ENV"
          done

      - name: Render API task definition template
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          template = Path("infrastructure/aws/backend/task-definitions/api.json").read_text()

          def replace_env(match):
              return json.dumps(os.environ.get(match.group(1), ""))[1:-1]

          rendered = re.sub(r"\$\{([A-Z0-9_]+)\}", replace_env, template)
          json.loads(rendered)
          Path("task-definition.json").write_text(rendered)
          PY

      - name: Inject image into task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ needs.build-api-image.outputs.image_uri }}

      - name: Deploy API task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: oziebot-api
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-workers:
    needs: migrate-api
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: backend/services/strategy-engine/Dockerfile
            repository: oziebot/strategy-engine
            task_definition: infrastructure/aws/backend/task-definitions/strategy-engine.json
            ecs_service: oziebot-strategy-engine
            container_name: strategy-engine
            scale_to_zero_before_deploy: false
          - dockerfile: backend/services/risk-engine/Dockerfile
            repository: oziebot/risk-engine
            task_definition: infrastructure/aws/backend/task-definitions/risk-engine.json
            ecs_service: oziebot-risk-engine
            container_name: risk-engine
            scale_to_zero_before_deploy: true
            restore_desired_count: 1
          - dockerfile: backend/services/execution-engine/Dockerfile
            repository: oziebot/execution-engine
            task_definition: infrastructure/aws/backend/task-definitions/execution-engine.json
            ecs_service: oziebot-execution-engine
            container_name: execution-engine
            scale_to_zero_before_deploy: true
            restore_desired_count: 1
          - dockerfile: backend/services/alerts-worker/Dockerfile
            repository: oziebot/alerts-worker
            task_definition: infrastructure/aws/backend/task-definitions/alerts-worker.json
            ecs_service: oziebot-alerts-worker
            container_name: alerts-worker
            scale_to_zero_before_deploy: true
            restore_desired_count: 1
          - dockerfile: backend/services/market-data-ingestor/Dockerfile
            repository: oziebot/market-data-ingestor
            task_definition: infrastructure/aws/backend/task-definitions/market-data-ingestor.json
            ecs_service: oziebot-market-data-ingestor
            container_name: market-data-ingestor
            scale_to_zero_before_deploy: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize deploy inputs
        run: |
          for name in \
            ECS_EXECUTION_ROLE_ARN \
            ECS_TASK_ROLE_ARN \
            DATABASE_URL_SECRET_ARN \
            JWT_SECRET_SECRET_ARN \
            STRIPE_SECRET_KEY_SECRET_ARN \
            STRIPE_WEBHOOK_SECRET_SECRET_ARN \
            EXCHANGE_CREDENTIALS_ENCRYPTION_KEY_SECRET_ARN \
            SMS_WEBHOOK_URL_SECRET_ARN \
            SLACK_WEBHOOK_URL_SECRET_ARN \
            TELEGRAM_BOT_TOKEN_SECRET_ARN \
            ECS_SUBNETS \
            ECS_SECURITY_GROUPS \
            ECS_ASSIGN_PUBLIC_IP \
            REDIS_URL \
            OBSERVABILITY_S3_BUCKET \
            OBSERVABILITY_S3_PREFIX \
            OBSERVABILITY_S3_REGION
          do
            value="${!name:-}"
            cleaned="$(printf '%s' "$value" | tr -d '[:space:]')"
            echo "${name}=${cleaned}" >> "$GITHUB_ENV"
          done

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:latest

      - name: Render task definition template
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          template = Path("${{ matrix.task_definition }}").read_text()

          def replace_env(match):
              return json.dumps(os.environ.get(match.group(1), ""))[1:-1]

          rendered = re.sub(r"\$\{([A-Z0-9_]+)\}", replace_env, template)
          json.loads(rendered)
          Path("task-definition.json").write_text(rendered)
          PY

      - name: Inject image into task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.container_name }}
          image: ${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:${{ github.sha }}

      - name: Scale worker to zero before deploy
        if: ${{ matrix.scale_to_zero_before_deploy }}
        shell: bash
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${{ matrix.ecs_service }}" \
            --desired-count 0 \
            >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${{ matrix.ecs_service }}"

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ matrix.ecs_service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Restore worker desired count
        if: ${{ matrix.scale_to_zero_before_deploy }}
        shell: bash
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${{ matrix.ecs_service }}" \
            --desired-count "${{ matrix.restore_desired_count }}" \
            >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${{ matrix.ecs_service }}"
